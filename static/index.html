<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorTalk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=5">
</head>
<body>
    <div class="grain"></div>

    <!-- History Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">History</h2>
            <button class="sidebar-close" id="sidebarClose" aria-label="Close history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="sidebar-list" id="sidebarList">
            <p class="sidebar-empty" id="sidebarEmpty">No history yet</p>
        </div>
    </aside>

    <div class="container">
        <header class="header">
            <button class="history-btn" id="historyBtn" aria-label="View history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </button>
            <p class="eyebrow">Acoustic Emotion Decoupling</p>
            <h1 class="title">Mirror<span class="title-accent">Talk</span></h1>
            <p class="subtitle">Hear yourself, but kinder.</p>
        </header>

        <section class="input-area" id="inputArea">
            <div class="record-ring">
                <div class="record-ring-pulse"></div>
                <button id="recordBtn" class="record-btn" aria-label="Record audio">
                    <svg id="micIcon" class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4Z"/>
                        <path d="M19 11a7 7 0 0 1-14 0"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <svg id="stopIcon" class="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
            <p class="record-label" id="recordLabel">Tap to record</p>
            <div class="divider-line">
                <span class="divider-text">or</span>
            </div>
            <label class="upload-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Upload audio file
                <input type="file" id="fileInput" accept="audio/*" hidden>
            </label>

            <div id="audioPreview" class="audio-preview" hidden>
                <audio id="previewPlayer" controls></audio>
                <button id="submitBtn" class="transform-btn">
                    <span class="transform-btn-text">Transform</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </section>

        <section id="loadingArea" class="loading-area" hidden>
            <div class="morph-container">
                <div class="morph-shape"></div>
            </div>
            <p class="loading-step" id="loadingStatus">Listening deeply...</p>
            <div class="loading-bar">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>
        </section>

        <section id="resultsArea" class="results-area" hidden>
            <div class="audio-player-card card-original-audio" style="--delay: 0">
                <p class="player-label player-label-fire">Original audio</p>
                <audio id="originalAudioPlayer" controls></audio>
            </div>

            <div class="result-card card-transcription" style="--delay: 1">
                <div class="card-label">
                    <span class="card-dot dot-fire"></span>
                    What you said
                </div>
                <blockquote class="card-body" id="transcriptionText"></blockquote>
            </div>

            <div class="insight-row">
                <div class="result-card card-emotion" style="--delay: 2">
                    <div class="card-label">
                        <span class="card-dot dot-rose"></span>
                        Emotion
                    </div>
                    <p class="card-body" id="emotionText"></p>
                </div>
                <div class="arrow-bridge">
                    <svg viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="1" width="40" height="24" opacity="0.3">
                        <path d="M0 12h36M30 6l6 6-6 6"/>
                    </svg>
                </div>
                <div class="result-card card-need" style="--delay: 3">
                    <div class="card-label">
                        <span class="card-dot dot-violet"></span>
                        Unmet need
                    </div>
                    <p class="card-body" id="needText"></p>
                </div>
            </div>

            <div class="transform-divider">
                <div class="transform-line"></div>
                <span class="transform-badge">transformed</span>
                <div class="transform-line"></div>
            </div>

            <div class="result-card card-rewrite" style="--delay: 4">
                <div class="card-label">
                    <span class="card-dot dot-mint"></span>
                    With compassion
                </div>
                <blockquote class="card-body card-body-rewrite" id="rewriteText"></blockquote>
            </div>

            <div class="audio-player-card" style="--delay: 5">
                <p class="player-label">Your voice, but calmer</p>
                <audio id="outputPlayer" controls></audio>
            </div>

            <div class="video-card" id="videoCard" style="--delay: 6" hidden>
                <div class="card-label">
                    <span class="card-dot dot-violet"></span>
                    Visual expression
                </div>
                <div class="video-content" id="videoContent">
                    <div class="video-loading" id="videoLoading">
                        <div class="video-spinner"></div>
                        <p class="video-status" id="videoStatus">Generating image...</p>
                    </div>
                    <div class="video-result" id="videoResult" hidden>
                        <video id="videoPlayer" controls playsinline loop></video>
                    </div>
                    <p class="video-error" id="videoError" hidden></p>
                </div>
            </div>

            <button id="resetBtn" class="reset-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
                Start over
            </button>
        </section>

        <section id="errorArea" class="error-area" hidden>
            <div class="error-card">
                <p id="errorText" class="error-text"></p>
                <button id="errorResetBtn" class="reset-btn">Try again</button>
            </div>
        </section>
    </div>

    <script src="/app.js?v=5"></script>
</body>
</html>
